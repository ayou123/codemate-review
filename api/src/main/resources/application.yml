spring:
  application:
    name: codemate-review
  datasource:
    url: ${DB_URL:jdbc:postgresql://10.81.87.11:5432/codemate}
    username: ${DB_USER:codemate}
    password: ${DB_PASSWORD:codemate}
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: ${REDIS_HOST:10.81.87.11}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
codemate:
  github:
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:my-codemate-secret-2026}
    app-token: ${GITHUB_TOKEN:github_pat_xx}
    api-base: https://api.github.com
  llm:
    provider: ${LLM_PROVIDER:deepseek}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
#      base-url: https://api.deepseek.com
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      model: qwen-plus
    qwen:
      api-key: ${DASHSCOPE_API_KEY:}
      model: qwen-max
  review:
    max-comments-per-pr: 20
    min-confidence: 70
    max-tokens-per-review: 50000
