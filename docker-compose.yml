services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: codemate
      POSTGRES_USER: codemate
      POSTGRES_PASSWORD: codemate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemate"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/codemate
      DB_USER: codemate
      DB_PASSWORD: codemate
      REDIS_HOST: redis
      CODEMATE_QUEUE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
